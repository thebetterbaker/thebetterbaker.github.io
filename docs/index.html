<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="icon" href="media/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/docs/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <div id="toc"></div>
        <div id="content"></div>
    </main>

    <button id="backToTop" title="Back to top">↑ Top</button>

    <div id="footer-placeholder"></div>

    <script>
        // Function to load external HTML into a placeholder element
        function loadComponent(placeholderId, filePath) {
            fetch(filePath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Failed to load ${filePath}`);
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById(placeholderId).innerHTML = data;
                })
                .catch(error => console.error(error));
        }

        // Load markdown content and parse it
        function loadMarkdown() {
            fetch('/docs/content.md')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load content.md');
                    }
                    return response.text();
                })
                .then(markdown => {
                    // Parse markdown to HTML
                    const html = marked.parse(markdown);
                    document.getElementById('content').innerHTML = html;
                    
                    // Generate table of contents
                    generateTableOfContents();
                })
                .catch(error => console.error(error));
        }

        // Generate table of contents from headings
        function generateTableOfContents() {
            const contentDiv = document.getElementById('content');
            const headings = contentDiv.querySelectorAll('h2, h3');
            
            if (headings.length === 0) return;

            let toc = '<h2>Table of Contents</h2><ul>';
            let currentLevel = 2;

            headings.forEach((heading, index) => {
                const level = parseInt(heading.tagName[1]);
                const text = heading.innerText;
                const id = 'heading-' + index;
                
                // Add ID to heading for linking
                heading.id = id;

                // Handle nesting
                if (level > currentLevel) {
                    toc += '<ul>'.repeat(level - currentLevel);
                } else if (level < currentLevel) {
                    toc += '</ul>'.repeat(currentLevel - level);
                }

                toc += `<li><a href="#${id}">${text}</a></li>`;
                currentLevel = level;
            });

            toc += '</ul>'.repeat(currentLevel - 2);
            toc += '</ul>';

            document.getElementById('toc').innerHTML = toc;
        }

        // Back to top button functionality
        const backToTopButton = document.getElementById('backToTop');

        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                backToTopButton.classList.add('show');
            } else {
                backToTopButton.classList.remove('show');
            }
        });

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // Call the functions
        loadComponent('header-placeholder', '/header.html');
        loadComponent('footer-placeholder', '/footer.html');
        loadMarkdown();
    </script>

</body>
</html>
